<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Sebuah surat untuk Zahra" />
    <title>Untuk Zahra</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;700&family=Inter:wght@400;500;600;700&family=Kalam:wght@400;700&display=swap"
      rel="stylesheet"
    />

    <!-- Styles -->
    <link rel="stylesheet" href="styles.css?v=20260708-warm-redesign" />
  </head>

  <body>
    <main class="scene" id="app">

      <!-- Intro Section -->
      <section class="intro is-visible" id="intro" aria-label="Pembuka">
        <div class="intro-copy">
          <span class="kicker">Azzahra Halimatu Syadiah</span>
          <h1>Untuk Zahra</h1>
          <p class="intro-note">Dibaca & Dipahami</p>
          <button class="primary-button" id="startButton" type="button">
            Mulai
          </button>
        </div>
      </section>

      <!-- Confirm Modal -->
      <section class="confirm" id="confirm" aria-label="Konfirmasi" aria-hidden="true">
        <div class="confirm-box">
          <p>Apa kamu yakin?</p>
          <div class="confirm-actions">
            <button class="ghost-button" id="noButton" type="button">
              Tidak
            </button>
            <button class="primary-button" id="yesButton" type="button">
              Iya
            </button>
          </div>
        </div>
      </section>

      <!-- Experience Section -->
      <section class="experience" id="experience" aria-label="Pesan" aria-hidden="true">

        <!-- Illustration Side -->
        <div class="art-wrap">
          <svg class="doodle" viewBox="0 0 760 620" role="img" aria-label="Ilustrasi Zahra">
            <defs>
              <filter id="paperNoise">
                <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" stitchTiles="stitch" />
                <feColorMatrix type="saturate" values="0" />
                <feComponentTransfer>
                  <feFuncA type="table" tableValues="0 0.055" />
                </feComponentTransfer>
              </filter>
              <linearGradient id="windowWash" x1="0" x2="1" y1="0" y2="1">
                <stop offset="0" stop-color="#d6f1ed" />
                <stop offset="1" stop-color="#f8d8c7" />
              </linearGradient>
            </defs>

            <!-- Room Background -->
            <rect class="room-fill" x="28" y="32" width="704" height="520" rx="26" />
            <rect class="room-noise" x="28" y="32" width="704" height="520" rx="26" filter="url(#paperNoise)" />

            <!-- Decorative Lines -->

            <path class="sketch line-4" d="M423 92 C498 76 592 81 659 112" />

            <!-- Watcher (Behind) -->

                <path class="watcher-face-fill" d="M218 219 C184 223 162 251 162 287 C162 326 188 351 225 351 C261 351 287 324 287 286 C287 247 258 216 218 219 Z" />

              <path class="cardigan-fill" d="M278 414 C310 392 434 391 475 418 C494 452 501 509 490 548 H264 C252 507 254 451 278 414 Z" />

              <g class="meal">
                <path class="box-fill" d="M305 468 L424 471 L438 524 L289 523 Z" />
                <path class="sketch line-14" d="M305 468 L424 471 L438 524 L289 523 Z" />
                <path class="sketch line-15" d="M318 488 C344 477 389 478 418 490 M304 507 C343 516 391 516 429 507" />
              </g>

              <!-- Water Bottle -->
              <g class="bottle shimmer">
                <path class="water-fill" d="M654 390 H690 L696 511 C684 520 662 520 649 511 Z" />
                <path class="cap-fill" d="M658 367 H686 V392 H658 Z" />
                <path class="sketch line-16" d="M654 390 H690 L696 511 C684 520 662 520 649 511 Z" />
                <path class="sketch line-17" d="M658 367 H686 V392 H658 Z M659 441 C670 447 683 447 694 440" />
              </g>
            </g>
          </svg>

          <!-- Memory Photo -->
          <figure class="memory-photo" id="memoryPhoto">
            <img src="assets/img/1782978891722.jpg" alt="Foto kenangan dengan Zahra" />
            <figcaption>ke foto kamu</figcaption>
          </figure>
        </div>

        <!-- Letter Side -->
        <article class="letter" aria-live="polite">
          <span class="letter-label">Pesan</span>
          <div class="text-frame" id="textFrame">
            <p class="message-text" id="messageText"></p>
          </div>
          <div class="progress" role="progressbar" aria-label="Progress membaca">
            <span id="progressFill"></span>
          </div>
          <p class="time" id="timeText">00:00 / 00:00</p>
          <p class="song-title" id="songTitle">🎵 Noah - Di Balik Awan</p>
        </article>

        <!-- Playlist Audio -->
        <audio id="song" preload="auto"></audio>
      </section>

      <!-- Ending Question -->
      <section class="ending-question" id="endingQuestion" aria-label="Pertanyaan terakhir" aria-hidden="true">
        <div class="ending-box">
          <h2 class="ending-title">Boleh ga aku pergi sekarang?</h2>
          <div class="ending-actions" id="endingActions">
            <button class="ghost-button" id="allowButton" type="button">
              Boleh
            </button>
            <button class="primary-button" id="stayButton" type="button">
              Jangan
            </button>
          </div>
          <p class="ending-answer" id="endingAnswer" aria-live="polite"></p>
        </div>
      </section>

    </main>

    <script src="script.js?v=20260708-warm-redesign"></script>
  </body>
</html>
